<div class="page">
  <h1>Paramètres</h1>

  <div class="sections">
    @for (s of sections; track s.label) {
      <div class="section">
        <h2>{{ s.label }}</h2>

        <div class="ajouter-form">
          <input
            type="text"
            placeholder="Nouveau libellé..."
            [(ngModel)]="s.libelle"
            (keyup.enter)="ajouter(s)"
          />
          <button class="btn-primary" (click)="ajouter(s)" [disabled]="!s.libelle.trim()">
            Ajouter
          </button>
        </div>

        <ul class="ref-list">
          @for (item of s.items; track item.id) {
            <li class="ref-item">
              <span>{{ item.libelle }}</span>
              <button class="btn-delete" (click)="supprimer(s, item.id)">✕</button>
            </li>
          } @empty {
            <li class="ref-empty">Aucune valeur.</li>
          }
        </ul>
      </div>
    }
  </div>
</div>
